<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人笔记</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f8;
    --bg-sidebar: #fafbfc;
    --bg-hover: #eef0f2;
    --bg-active: #e3e7ee;
    --bg-input: #ffffff;
    --text-primary: #1a1a2e;
    --text-secondary: #555770;
    --text-muted: #999;
    --border-color: #e0e0e6;
    --accent: #4a6cf7;
    --accent-hover: #3b5de7;
    --danger: #e74c3c;
    --danger-hover: #c0392b;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
    --sidebar-width: 260px;
    --toolbar-height: 48px;
  }
  [data-theme="dark"] {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-sidebar: #0f1628;
    --bg-hover: #1e2a45;
    --bg-active: #253352;
    --bg-input: #1e2a45;
    --text-primary: #e0e0e8;
    --text-secondary: #a0a0b8;
    --text-muted: #666680;
    --border-color: #2a2a45;
    --accent: #5b7cf7;
    --accent-hover: #7b95ff;
    --danger: #e74c3c;
    --danger-hover: #ff6b5a;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    height: 100vh;
    background: var(--bg-primary);
    color: var(--text-primary);
    transition: background 0.3s, color 0.3s;
    overflow: hidden;
  }
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    transition: background 0.3s, border-color 0.3s;
    z-index: 10;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: var(--toolbar-height);
  }
  .sidebar-header h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .btn-new {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .btn-new:hover { background: var(--accent-hover); }
  .note-list { flex: 1; overflow-y: auto; padding: 8px; }
  .note-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .note-item:hover { background: var(--bg-hover); }
  .note-item.active { background: var(--bg-active); }
  .note-item-info { flex: 1; min-width: 0; margin-right: 8px; }
  .note-item-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
  }
  .note-item-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .note-item-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }
  .note-item:hover .note-item-delete { opacity: 1; }
  .note-item-delete:hover { color: var(--danger); background: rgba(231,76,60,0.1); }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-primary); transition: background 0.3s; }
  .toolbar {
    height: var(--toolbar-height);
    min-height: var(--toolbar-height);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--bg-secondary);
    transition: background 0.3s, border-color 0.3s;
  }
  .toolbar-left { display: flex; align-items: center; gap: 10px; }
  .btn-toggle-sidebar {
    background: none;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 16px;
    display: none;
    transition: background 0.15s;
  }
  .btn-toggle-sidebar:hover { background: var(--bg-hover); }
  .mode-toggle {
    display: flex;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    overflow: hidden;
  }
  .mode-btn {
    padding: 4px 14px;
    font-size: 12px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active { background: var(--accent); color: #fff; }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .btn-theme {
    background: none;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 16px;
    transition: background 0.15s;
  }
  .btn-theme:hover { background: var(--bg-hover); }
  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 32px;
    overflow-y: auto;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }
  .note-title-input {
    font-size: 28px;
    font-weight: 700;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text-primary);
    width: 100%;
    margin-bottom: 8px;
    transition: color 0.3s;
  }
  .note-title-input::placeholder { color: var(--text-muted); }
  .note-date { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
  .editor-container { flex: 1; position: relative; }
  .editor-textarea {
    width: 100%;
    height: 100%;
    min-height: 400px;
    border: none;
    outline: none;
    resize: none;
    font-size: 15px;
    line-height: 1.8;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    background: transparent;
    color: var(--text-primary);
    transition: color 0.3s;
  }
  .editor-textarea::placeholder { color: var(--text-muted); }
  .preview-content {
    width: 100%;
    height: 100%;
    min-height: 400px;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-primary);
    overflow-y: auto;
  }
  .preview-content h1 { font-size: 2em; margin: 0.8em 0 0.4em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
  .preview-content h2 { font-size: 1.5em; margin: 0.8em 0 0.4em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
  .preview-content h3 { font-size: 1.25em; margin: 0.6em 0 0.3em; }
  .preview-content p { margin: 0.6em 0; }
  .preview-content code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  .preview-content pre { background: var(--bg-secondary); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
  .preview-content pre code { background: none; padding: 0; }
  .preview-content blockquote { border-left: 4px solid var(--accent); padding: 8px 16px; margin: 1em 0; background: var(--bg-secondary); border-radius: 0 8px 8px 0; color: var(--text-secondary); }
  .preview-content ul, .preview-content ol { padding-left: 24px; margin: 0.6em 0; }
  .preview-content li { margin: 0.3em 0; }
  .preview-content a { color: var(--accent); text-decoration: none; }
  .preview-content a:hover { text-decoration: underline; }
  .preview-content img { max-width: 100%; border-radius: 8px; }
  .preview-content hr { border: none; border-top: 1px solid var(--border-color); margin: 1.5em 0; }
  .preview-content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  .preview-content th, .preview-content td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: left; }
  .preview-content th { background: var(--bg-secondary); font-weight: 600; }
  .no-note { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 15px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; height: 100vh; transform: translateX(-100%); transition: transform 0.3s ease; box-shadow: var(--shadow); }
    .sidebar.open { transform: translateX(0); }
    .btn-toggle-sidebar { display: block; }
    .editor-area { padding: 16px; }
  }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 9; }
  .sidebar-overlay.show { display: block; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>📝 笔记目录</h2>
    <button class="btn-new" id="btnNew" title="新建笔记"><span>＋</span> 新建</button>
  </div>
  <div class="note-list" id="noteList"></div>
</aside>
<main class="main" id="mainContent">
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn-toggle-sidebar" id="btnToggleSidebar" title="切换目录">☰</button>
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="edit">编写</button>
        <button class="mode-btn" data-mode="preview">预览</button>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="btn-theme" id="btnTheme" title="切换主题">🌙</button>
    </div>
  </div>
  <div class="editor-area" id="editorArea" style="display:none;">
    <input type="text" class="note-title-input" id="noteTitleInput" placeholder="笔记标题…" />
    <div class="note-date" id="noteDate"></div>
    <div class="editor-container">
      <textarea class="editor-textarea" id="editorTextarea" placeholder="开始写 Markdown 吧…&#10;&#10;支持标题、列表、代码块、引用等语法"></textarea>
      <div class="preview-content" id="previewContent" style="display:none;"></div>
    </div>
  </div>
  <div class="no-note" id="noNoteHint">点击左侧「＋ 新建」创建第一篇笔记</div>
</main>
<script>
(function() {
  'use strict';
  var STORAGE_KEY_NOTES = 'gitnote_notes';
  var STORAGE_KEY_ACTIVE = 'gitnote_active_id';
  var STORAGE_KEY_THEME = 'gitnote_theme';
  var notes = [];
  var activeNoteId = null;
  var currentMode = 'edit';
  var sidebarOpen = window.innerWidth > 768;

  function $(id) { return document.getElementById(id); }

  var sidebar = $('sidebar');
  var sidebarOverlay = $('sidebarOverlay');
  var noteListEl = $('noteList');
  var btnNew = $('btnNew');
  var editorArea = $('editorArea');
  var noNoteHint = $('noNoteHint');
  var noteTitleInput = $('noteTitleInput');
  var noteDateEl = $('noteDate');
  var editorTextarea = $('editorTextarea');
  var previewContent = $('previewContent');
  var btnTheme = $('btnTheme');
  var modeToggle = $('modeToggle');
  var btnToggleSidebar = $('btnToggleSidebar');

  function init() {
    loadData();
    applyTheme();
    renderNoteList();
    restoreActiveNote();
    bindEvents();
    updateSidebarVisibility();
  }

  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY_NOTES);
      notes = raw ? JSON.parse(raw) : [];
    } catch(e) {
      notes = [];
    }
    try {
      activeNoteId = localStorage.getItem(STORAGE_KEY_ACTIVE);
    } catch(e) {}
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY_NOTES, JSON.stringify(notes));
    if (activeNoteId) {
      localStorage.setItem(STORAGE_KEY_ACTIVE, activeNoteId);
    } else {
      localStorage.removeItem(STORAGE_KEY_ACTIVE);
    }
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
  }

  function applyTheme() {
    var theme = localStorage.getItem(STORAGE_KEY_THEME);
    if (!theme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
    btnTheme.textContent = theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  }

  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(STORAGE_KEY_THEME, next);
    btnTheme.textContent = next === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  }

  function renderNoteList() {
    var sorted = notes.slice().sort(function(a, b) {
      return new Date(b.updatedAt) - new Date(a.updatedAt);
    });
    if (sorted.length === 0) {
      noteListEl.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><p>还没有笔记<br/>点击「＋ 新建」开始</p></div>';
      return;
    }
    var html = '';
    for (var i = 0; i < sorted.length; i++) {
      var note = sorted[i];
      var isActive = note.id === activeNoteId;
      var dateStr = formatDate(note.updatedAt);
      var title = note.title || '无标题';
      html += '<div class="note-item' + (isActive ? ' active' : '') + '" data-id="' + note.id + '">' +
        '<div class="note-item-info"><div class="note-item-title">' + escapeHtml(title) + '</div>' +
        '<div class="note-item-date">' + dateStr + '</div></div>' +
        '<button class="note-item-delete" data-delete="' + note.id + '" title="删除">\u2715</button></div>';
    }
    noteListEl.innerHTML = html;
  }

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
    return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate());
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function restoreActiveNote() {
    if (activeNoteId && notes.find(function(n) { return n.id === activeNoteId; })) {
      showEditor(activeNoteId);
    } else if (notes.length > 0) {
      showEditor(notes[0].id);
    } else {
      showPlaceholder();
    }
  }

  function showEditor(noteId) {
    var note = notes.find(function(n) { return n.id === noteId; });
    if (!note) return;
    activeNoteId = noteId;
    saveData();
    editorArea.style.display = 'flex';
    noNoteHint.style.display = 'none';
    noteTitleInput.value = note.title;
    editorTextarea.value = note.content;
    noteDateEl.textContent = '创建于 ' + new Date(note.createdAt).toLocaleString('zh-CN') +
      ' \u00b7 更新于 ' + new Date(note.updatedAt).toLocaleString('zh-CN');
    renderNoteList();
    updatePreview();
    closeMobileSidebar();
  }

  function showPlaceholder() {
    editorArea.style.display = 'none';
    noNoteHint.style.display = 'flex';
    activeNoteId = null;
    saveData();
    renderNoteList();
  }

  function createNote() {
    var note = {
      id: generateId(),
      title: '',
      content: '',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    notes.push(note);
    saveData();
    showEditor(note.id);
    noteTitleInput.focus();
    closeMobileSidebar();
  }

  function deleteNote(noteId) {
    var note = notes.find(function(n) { return n.id === noteId; });
    if (!note) return;
    var title = note.title || '无标题';
    if (!confirm('确定要删除笔记「' + title + '」吗？')) return;
    notes = notes.filter(function(n) { return n.id !== noteId; });
    saveData();
    if (activeNoteId === noteId) {
      if (notes.length > 0) { showEditor(notes[0].id); }
      else { showPlaceholder(); }
    } else { renderNoteList(); }
  }

  function updateActiveNote() {
    if (!activeNoteId) return;
    var note = notes.find(function(n) { return n.id === activeNoteId; });
    if (!note) return;
    note.title = noteTitleInput.value.trim();
    note.content = editorTextarea.value;
    note.updatedAt = new Date().toISOString();
    saveData();
    renderNoteList();
    noteDateEl.textContent = '创建于 ' + new Date(note.createdAt).toLocaleString('zh-CN') +
      ' \u00b7 更新于 ' + new Date(note.updatedAt).toLocaleString('zh-CN');
  }

  var saveTimer = null;
  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(updateActiveNote, 300);
  }

  function updatePreview() {
    if (currentMode === 'preview') {
      try {
        previewContent.innerHTML = marked.parse(editorTextarea.value);
      } catch(e) {
        previewContent.innerHTML = '<p style="color:var(--danger)">渲染出错</p>';
      }
    }
  }

  function setMode(mode) {
    currentMode = mode;
    var btns = modeToggle.querySelectorAll('.mode-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', btns[i].getAttribute('data-mode') === mode);
    }
    if (mode === 'edit') {
      editorTextarea.style.display = 'block';
      previewContent.style.display = 'none';
    } else {
      editorTextarea.style.display = 'none';
      previewContent.style.display = 'block';
      updatePreview();
    }
  }

  function updateSidebarVisibility() {
    if (window.innerWidth <= 768) {
      sidebar.classList.remove('open');
      sidebarOpen = false;
    } else {
      sidebar.classList.add('open');
      sidebarOpen = true;
    }
  }

  function toggleMobileSidebar() {
    sidebarOpen = !sidebarOpen;
    sidebar.classList.toggle('open', sidebarOpen);
    sidebarOverlay.classList.toggle('show', sidebarOpen);
  }

  function closeMobileSidebar() {
    if (window.innerWidth <= 768) {
      sidebarOpen = false;
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('show');
    }
  }

  function bindEvents() {
    btnNew.addEventListener('click', createNote);

    noteListEl.addEventListener('click', function(e) {
      var deleteBtn = e.target.closest('[data-delete]');
      if (deleteBtn) {
        e.stopPropagation();
        deleteNote(deleteBtn.getAttribute('data-delete'));
        return;
      }
      var item = e.target.closest('.note-item');
      if (item) {
        showEditor(item.getAttribute('data-id'));
      }
    });

    noteTitleInput.addEventListener('input', scheduleSave);
    editorTextarea.addEventListener('input', scheduleSave);

    modeToggle.addEventListener('click', function(e) {
      var btn = e.target.closest('.mode-btn');
      if (btn) setMode(btn.getAttribute('data-mode'));
    });

    btnTheme.addEventListener('click', toggleTheme);
    btnToggleSidebar.addEventListener('click', toggleMobileSidebar);
    sidebarOverlay.addEventListener('click', closeMobileSidebar);
    window.addEventListener('resize', function() { updateSidebarVisibility(); });

    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        clearTimeout(saveTimer);
        updateActiveNote();
      }
    });
  }

  init();
})();
</script>
</body>
</html>
